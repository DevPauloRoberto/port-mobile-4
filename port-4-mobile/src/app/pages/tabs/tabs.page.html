<ion-tabs>
  <ion-tab-bar slot="bottom" role="tablist" aria-label="Navegação principal">

    <ion-tab-button tab="home" [routerLink]="['/tabs/home']" routerDirection="root" role="tab" aria-label="Início">
      <ion-icon name="home-outline" aria-hidden="true"></ion-icon>
      <ion-label>Início</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="grupos" [routerLink]="['/tabs/grupos']" routerDirection="root" role="tab" aria-label="Grupos">
      <ion-icon name="grid-outline" aria-hidden="true"></ion-icon>
      <ion-label>Grupos</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="partidas" [routerLink]="['/tabs/partidas']" routerDirection="root" role="tab" aria-label="Partidas">
      <ion-icon name="football-outline" aria-hidden="true"></ion-icon>
      <ion-label>Partidas</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="perfil" [routerLink]="['/tabs/perfil']" routerDirection="root" role="tab" aria-label="Perfil">
      <ion-icon name="person-circle-outline" aria-hidden="true"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
